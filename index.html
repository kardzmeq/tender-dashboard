<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TED Overview Hub</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>TED Overview Hub</h1>
      <p>Select rows from <code>Agent_2</code> + <code>Agent_2_Results</code>, then click <strong>Submit</strong> to render newsletter cards.</p>
      <div id="loadStatus" class="status">Loading workbook...</div>
      <div id="loadWarnings" class="warnings" aria-live="polite"></div>
    </header>

    <section class="controls" aria-label="Filters">
      <div class="control-row">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="text" placeholder="Title, location, category, leistungen...">
      </div>
      <div class="control-grid">
        <div>
          <label for="typeFilter">Type</label>
          <select id="typeFilter">
            <option value="all">Both</option>
            <option value="new_competition">New Competition</option>
            <option value="results">Results</option>
          </select>
        </div>
        <div>
          <label for="locationFilter">Location</label>
          <select id="locationFilter"></select>
        </div>
        <div>
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter"></select>
        </div>
        <div>
          <label for="scoreFilter">Score</label>
          <select id="scoreFilter"></select>
        </div>
      </div>
      <div class="action-row">
        <button id="clearFiltersBtn" class="btn ghost">Clear Filters</button>
        <button id="clearSelectionBtn" class="btn ghost">Clear Selection</button>
        <button id="submitBtn" class="btn primary">Submit</button>
      </div>
      <div id="tableMeta" class="meta"></div>
    </section>

    <section class="table-panel" aria-label="Selectable rows">
      <table id="overviewTable">
        <thead>
          <tr>
            <th>Select</th>
            <th>Type</th>
            <th>Score</th>
            <th>Date</th>
            <th>Title</th>
            <th>Location</th>
            <th>Category</th>
            <th>ID</th>
          </tr>
        </thead>
        <tbody id="overviewBody">
          <tr><td colspan="8" class="empty">Loading rows...</td></tr>
        </tbody>
      </table>
    </section>

    <section aria-label="Submitted cards" class="results-panel">
      <h2>Submitted Results</h2>
      <div id="submitInfo" class="meta">No submission yet.</div>
      <div id="cardsContainer"></div>
    </section>
  </main>
</body>
</html>
