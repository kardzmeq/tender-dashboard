<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sbp Tenders Hub</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="supabase-config.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <h1>sbp Tenders Hub</h1>
  <section id="authPanel" class="auth-panel">
    <div class="auth-head">
      <div id="authStatus" class="auth-status">Nicht angemeldet</div>
      <button id="authToggleBtn" class="action-btn auth-toggle-btn" type="button">Ausblenden</button>
    </div>
    <div class="auth-grid">
      <form id="registerForm" class="auth-form">
        <h2>Registrieren</h2>
        <label for="registerEmail">E-Mail</label>
        <input id="registerEmail" type="email" required autocomplete="email">
        <label for="registerPassword">Passwort</label>
        <input id="registerPassword" type="password" required autocomplete="new-password" minlength="8">
        <button class="action-btn" type="submit">Registrieren</button>
      </form>
      <form id="loginForm" class="auth-form">
        <h2>Anmelden</h2>
        <label for="loginEmail">E-Mail</label>
        <input id="loginEmail" type="email" required autocomplete="email">
        <label for="loginPassword">Passwort</label>
        <input id="loginPassword" type="password" required autocomplete="current-password">
        <button class="action-btn submit-btn" type="submit">Anmelden</button>
      </form>
      <div class="auth-form auth-actions">
        <h2>Konto</h2>
        <p>Kommentare und globale Score-Overrides sind nur für registrierte Nutzer verfügbar.</p>
        <button id="logoutBtn" class="action-btn" type="button">Abmelden</button>
      </div>
    </div>
    <div id="authMessage" class="auth-message" aria-live="polite"></div>
  </section>

  <div id="loadStatus" class="period-banner">Lade Datei...</div>
  <p id="metaInfo" class="meta"></p>
  <div id="loadWarnings" class="warnings" aria-live="polite"></div>

  <div class="toolbar">
    <div class="search-row">
      <input id="liveSearch" type="text" placeholder="Search title, location, leistungen...">
    </div>

    <div class="date-row">
      <div class="date-field">
        <label for="startDate">Start Date</label>
        <input id="startDate" type="date">
      </div>
      <div class="date-field">
        <label for="endDate">End Date</label>
        <input id="endDate" type="date">
      </div>
      <div class="date-field date-quick-field">
        <label>Zeitraum</label>
        <div class="button-wrap">
          <button class="action-btn date-range-btn" type="button" data-days="1">Heute</button>
          <button class="action-btn date-range-btn" type="button" data-days="7">Letzte 7 Tage</button>
          <button class="action-btn date-range-btn" type="button" data-days="30">Letzte 30 Tage</button>
        </div>
      </div>
    </div>

    <div class="filter-row">
      <strong>Type</strong>
      <div class="button-wrap" id="typeFilters">
        <button class="filter-btn active" data-filter-group="type" data-value="all">Both</button>
        <button class="filter-btn" data-filter-group="type" data-value="new_competition">New Competition</button>
        <button class="filter-btn" data-filter-group="type" data-value="results">Results</button>
      </div>
    </div>
    <div class="filter-row">
      <strong>Location</strong>
      <div class="button-wrap" id="locationFilters">
        <button class="filter-btn active" data-filter-group="location" data-value="all">All</button>
      </div>
    </div>
    <div class="filter-row">
      <strong>Category</strong>
      <div class="button-wrap" id="categoryFilters">
        <button class="filter-btn active" data-filter-group="category" data-value="all">All</button>
      </div>
    </div>
    <div class="filter-row">
      <strong>Score</strong>
      <div class="button-wrap" id="scoreFilters">
        <button class="filter-btn active" data-filter-group="score" data-value="all">All</button>
      </div>
    </div>
    <div class="filter-row">
      <strong>Quick Filters</strong>
      <div class="button-wrap">
        <button id="approvedFilterBtn" class="filter-btn" type="button">Approved by AKQ</button>
        <button id="commentsFilterBtn" class="filter-btn" type="button">Cards with comments</button>
      </div>
    </div>
    <div class="filter-row">
      <strong>Sortierung</strong>
      <div class="button-wrap">
        <select id="sortOrder" class="sort-select">
          <option value="score_desc">Score (highest first)</option>
          <option value="date_desc">Date (most recent first)</option>
          <option value="date_asc">Date (oldest first)</option>
          <option value="deadline_desc">Abgabefrist (latest first)</option>
          <option value="deadline_asc">Abgabefrist (earliest first)</option>
          <option value="cost_desc">Kosten (highest first)</option>
          <option value="cost_asc">Kosten (lowest first)</option>
        </select>
      </div>
    </div>
  </div>

  <div id="resultsCount" class="results-count"></div>
  <div id="cardsPool"></div>
</body>
</html>
